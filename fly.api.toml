# Fly.io configuration for DRC API (Uganda hackathon)
app = "drc-api"
primary_region = "jnb"   # Johannesburg — closest Fly region to Uganda

[build]
  dockerfile = "DRC.Api/Dockerfile"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS = "http://+:8080"
  # DATABASE_URL is provided via `fly secrets set` (Neon Postgres URL)

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine warm so judges don't hit a cold start
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/alive"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
