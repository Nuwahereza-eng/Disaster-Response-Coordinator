services:
  # Backend API - Africa's Talking Hackathon Instance
  - type: web
    name: drc-at-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    plan: free
    branch: africastalking-hackathon
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: DATABASE_URL
        fromDatabase:
          name: drc-at-postgres
          property: connectionString
      - key: ConnectionStrings__redis
        fromService:
          type: redis
          name: drc-at-redis
          property: connectionString
      - key: Apps__Gemini__Key
        sync: false  # Set in Render dashboard
      - key: Apps__Meta__AccessToken
        sync: false
      - key: Apps__Meta__Key
        sync: false
      - key: Apps__Meta__WhatsAppBusinessAccountId
        sync: false
      - key: Apps__Meta__WhatsAppBusinessPhoneNumberId
        sync: false
      - key: Apps__AfricasTalking__Username
        sync: false  # Set to: drc-ug
      - key: Apps__AfricasTalking__ApiKey
        sync: false  # Set your AT API key
      - key: Apps__AfricasTalking__SenderId
        value: DRC_UG

  # Frontend Blazor App - Africa's Talking Hackathon Instance
  - type: web
    name: drc-at-app
    runtime: docker
    dockerfilePath: ./Dockerfile.app
    plan: free
    branch: africastalking-hackathon
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: services__api__http__0
        fromService:
          type: web
          name: drc-at-api
          property: host

  # Redis Cache - AT Hackathon
  - type: redis
    name: drc-at-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

# PostgreSQL Database - AT Hackathon
databases:
  - name: drc-at-postgres
    plan: free
    databaseName: drc_at_db
    user: drc_at_user
