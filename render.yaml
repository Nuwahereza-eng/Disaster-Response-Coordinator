services:
  # Backend API
  - type: web
    name: drc-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: DATABASE_URL
        fromDatabase:
          name: drc-postgres
          property: connectionString
      - key: ConnectionStrings__redis
        fromService:
          type: redis
          name: drc-redis
          property: connectionString
      - key: Apps__Gemini__Key
        sync: false  # Set this manually in Render dashboard
      - key: Apps__Meta__AccessToken
        sync: false  # Set this manually in Render dashboard
      - key: Apps__Meta__Key
        sync: false
      - key: Apps__Meta__WhatsAppBusinessAccountId
        sync: false
      - key: Apps__Meta__WhatsAppBusinessPhoneNumberId
        sync: false
      - key: Apps__AfricasTalking__Username
        sync: false  # Set this manually in Render dashboard
      - key: Apps__AfricasTalking__ApiKey
        sync: false  # Set this manually in Render dashboard
      - key: Apps__AfricasTalking__SenderId
        value: ATInfo

  # Frontend Blazor App
  - type: web
    name: drc-app
    runtime: docker
    dockerfilePath: ./Dockerfile.app
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ApiUrl
        sync: false  # Set in Render dashboard to: https://drc-api.onrender.com

  # Redis Cache
  - type: redis
    name: drc-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Allow all IPs (empty list means all Render services can connect)

# PostgreSQL Database
databases:
  - name: drc-postgres
    plan: free
    databaseName: drc_db
    user: drc_user
