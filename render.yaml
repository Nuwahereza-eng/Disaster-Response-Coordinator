# Render Blueprint — DRC (Uganda)
# Uses Neon Postgres (external, never expires) instead of Render's built-in
# Postgres which deletes free DBs after 90 days.
services:
  # Backend API
  - type: web
    name: drc-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    region: frankfurt          # closest Render region to Uganda
    plan: free
    healthCheckPath: /alive
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      # Neon Postgres connection string — set manually in Render dashboard.
      # Format: postgresql://user:pass@ep-xxx.neon.tech/neondb?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: Apps__Gemini__Key
        sync: false
      - key: Apps__Meta__AccessToken
        sync: false
      - key: Apps__Meta__Key
        sync: false
      - key: Apps__Meta__AppName
        value: Direco
      - key: Apps__Meta__WhatsAppBusinessAccountId
        sync: false
      - key: Apps__Meta__WhatsAppBusinessPhoneNumberId
        sync: false
      - key: Apps__AfricasTalking__Username
        sync: false
      - key: Apps__AfricasTalking__ApiKey
        sync: false
      - key: Apps__AfricasTalking__SenderId
        value: ATInfo

  # Frontend Blazor App
  - type: web
    name: drc-app
    runtime: docker
    dockerfilePath: ./Dockerfile.app
    region: frankfurt
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      # Must point at the API service: https://drc-api.onrender.com
      - key: ApiUrl
        fromService:
          type: web
          name: drc-api
          property: host
