# Fly.io configuration for DRC App (Frontend)
app = "drc-app"
primary_region = "gru"  # São Paulo, closest to Brazil

[build]
  dockerfile = "DRC.App/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
